services:
  postgres:
    image: postgres:15
    container_name: social_db
    environment:
      POSTGRES_USER: social_user
      POSTGRES_PASSWORD: social_pass
      POSTGRES_DB: social_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - social-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social_user -d social_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # ✅ Labels pour forcer l'exposition des ports dans Codespaces
    labels:
      - "dev.ports.publish=5432"
      - "dev.ports.visibility=public"

  redis:
    image: redis:7-alpine
    container_name: social_redis
    ports:
      - "6470:6379"
    networks:
      - social-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # ✅ Labels pour forcer l'exposition des ports dans Codespaces
    labels:
      - "dev.ports.publish=6470"
      - "dev.ports.visibility=public"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: social_rabbitmq
    user: "999:999"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - social-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # ✅ Labels pour forcer l'exposition des ports dans Codespaces
    labels:
      - "dev.ports.publish=5672,15672"
      - "dev.ports.visibility=public"

  social_keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: social_keycloak
    command: start-dev --import-realm
    volumes:
      - ./keycloak/realm-social-togo.json:/opt/keycloak/data/import/realm-social-togo.json:ro
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: social_user
      KC_DB_PASSWORD: social_pass
      KC_DB_SCHEMA: public
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_LOG_LEVEL: INFO
      KC_IMPORT_FILES: /opt/keycloak/data/import/realm-social-togo.json
    ports:
      - "8080:8080"
    networks:
      - social-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q 'UP'"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 180s
    # ✅ Labels pour forcer l'exposition des ports dans Codespaces
    labels:
      - "dev.ports.publish=8080"
      - "dev.ports.visibility=public"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - social-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # ✅ Labels pour forcer l'exposition des ports dans Codespaces
    labels:
      - "dev.ports.publish=9090"
      - "dev.ports.visibility=public"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - social-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # ✅ Labels pour forcer l'exposition des ports dans Codespaces
    labels:
      - "dev.ports.publish=3000"
      - "dev.ports.visibility=public"

  config-server:
    build: ./config-server
    container_name: config_server
    ports:
      - "8888:8888"
    networks:
      - social-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 70s
    # ✅ Labels pour forcer l'exposition des ports dans Codespaces
    labels:
      - "dev.ports.publish=8888"
      - "dev.ports.visibility=public"

  discovery-service:
    build: ./discovery-service
    container_name: discovery_service
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - social-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 70s
    # ✅ Labels pour forcer l'exposition des ports dans Codespaces
    labels:
      - "dev.ports.publish=8761"
      - "dev.ports.visibility=public"

  api-gateway:
    build: ./api-gateway
    container_name: api_gateway
    ports:
      - "9000:9000"
    depends_on:
      discovery-service:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - JWT_SECRET=5A7134743777217A25432A462D4A614E645267556B58703272357538782F413F
    networks:
      - social-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9000/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    # ✅ Labels POUR FORCER l'exposition du port 9000 dans Codespaces (TRÈS IMPORTANT)
    labels:
      - "dev.ports.publish=9000"
      - "dev.ports.visibility=public"
      - "dev.ports.protocol=http"

  auth-service:
    build: ./auth-service
    container_name: auth_service
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      social_keycloak:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=social_db
      - POSTGRES_USER=social_user
      - POSTGRES_PASSWORD=social_pass
      - REDIS_HOST=redis
      - JWT_SECRET=5A7134743777217A25432A462D4A614E645267556B58703272357538782F413F
      - MAIL_HOST=smtp.gmail.com
      - MAIL_USERNAME=votre-email@gmail.com
      - MAIL_PASSWORD=votre-password
      - KEYCLOAK_URL=http://social_keycloak:8080
      - KEYCLOAK_REALM=social-togo
      - KEYCLOAK_CLIENT_ID=social-platform
      - KEYCLOAK_CLIENT_SECRET=social-platform-secret-2024
    networks:
      - social-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    # ✅ Labels pour forcer l'exposition des ports dans Codespaces
    labels:
      - "dev.ports.publish=8081"
      - "dev.ports.visibility=public"

  main-service:
    build: ./main-service
    container_name: main_service
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=social_db
      - POSTGRES_USER=social_user
      - POSTGRES_PASSWORD=social_pass
      - RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
      - SPRING_RABBITMQ_HOST=rabbitmq
    networks:
      - social-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    # ✅ Labels pour forcer l'exposition des ports dans Codespaces
    labels:
      - "dev.ports.publish=8082"
      - "dev.ports.visibility=public"

  scoring-service:
    build: ./scoring-service-python
    container_name: scoring_service
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=social_db
      - POSTGRES_USER=social_user
      - POSTGRES_PASSWORD=social_pass
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
    networks:
      - social-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    # ✅ Labels pour forcer l'exposition des ports dans Codespaces
    labels:
      - "dev.ports.publish=8083"
      - "dev.ports.visibility=public"

  admin-service:
    build: ./admin-service
    container_name: admin_service
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=social_db
      - POSTGRES_USER=social_user
      - POSTGRES_PASSWORD=social_pass
    networks:
      - social-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    # ✅ Labels pour forcer l'exposition des ports dans Codespaces
    labels:
      - "dev.ports.publish=8084"
      - "dev.ports.visibility=public"

  report-service:
    build: ./report-service
    container_name: report_service
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=social_db
      - POSTGRES_USER=social_user
      - POSTGRES_PASSWORD=social_pass
    networks:
      - social-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    # ✅ Labels pour forcer l'exposition des ports dans Codespaces
    labels:
      - "dev.ports.publish=8085"
      - "dev.ports.visibility=public"

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  social-network:
    driver: bridge