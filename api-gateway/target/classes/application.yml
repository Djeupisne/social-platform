server:
  port: 9000

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: redis
      port: 6379
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origin-patterns:
              - "*"                              # ← wildcard pour DEV → accepte TOUTES origines Codespaces
              - "https://*.app.github.dev"       # ← plus précis pour Codespaces (tous les sous-domaines)
            allowed-methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowed-headers: "*"
            allow-credentials: false             # ← false obligatoire avec wildcard (*)
            max-age: 3600
      routes:
        # AUTH SERVICE - route directe sans rewrite (comme tu l'as déjà corrigé)
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**

        # MAIN SERVICE
        - id: main-service
          uri: http://main-service:8082
          predicates:
            - Path=/api/v1/menages/**,/api/v1/residents/**

        # SCORING SERVICE
        - id: scoring-service
          uri: http://scoring-service:8083
          predicates:
            - Path=/api/v1/scoring/**

        # ADMIN SERVICE
        - id: admin-service
          uri: http://admin-service:8084
          predicates:
            - Path=/api/v1/admin/**,/api/v1/programmes/**

        # REPORT SERVICE
        - id: report-service
          uri: http://report-service:8085
          predicates:
            - Path=/api/v1/reports/**

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: api-gateway
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    mail:
      enabled: false
    redis:
      enabled: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: auth
        url: /auth/v3/api-docs
      - name: main
        url: /main/v3/api-docs
      - name: admin
        url: /admin/v3/api-docs
      - name: report
        url: /report/v3/api-docs
  api-docs:
    enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG