server:
  port: 9000

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_SERVICE_HOST:redis}
      port: 6379
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "https://fluffy-fishstick-g4rw6p9w564pc6g4-4200.app.github.dev"
              - "https://special-xylophone-9754wxv4qqr7c9pw6-4200.app.github.dev"
            allowed-methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600
      routes:
        # ────────────────────────────────────────────────
        # AUTH SERVICE
        # ────────────────────────────────────────────────
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: AuthenticationFilter
              args:
                skip: true  # Skip authentication for auth service

        # ────────────────────────────────────────────────
        # MAIN SERVICE
        # ────────────────────────────────────────────────
        - id: main-service
          uri: lb://main-service
          predicates:
            - Path=/api/v1/menages/**,/api/v1/residents/**
          filters:
            - name: AuthenticationFilter

        # ────────────────────────────────────────────────
        # SCORING SERVICE
        # ────────────────────────────────────────────────
        - id: scoring-service
          uri: lb://scoring-service
          predicates:
            - Path=/api/v1/scoring/**
          filters:
            - name: AuthenticationFilter

        # ────────────────────────────────────────────────
        # ADMIN SERVICE
        # ────────────────────────────────────────────────
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/v1/admin/**,/api/v1/programmes/**
          filters:
            - name: AuthenticationFilter

        # ────────────────────────────────────────────────
        # REPORT SERVICE
        # ────────────────────────────────────────────────
        - id: report-service
          uri: lb://report-service
          predicates:
            - Path=/api/v1/reports/**
          filters:
            - name: AuthenticationFilter

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: ${spring.application.name}
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    mail:
      enabled: false
    redis:
      enabled: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: auth
        url: /auth/v3/api-docs
      - name: main
        url: /main/v3/api-docs
      - name: admin
        url: /admin/v3/api-docs
      - name: report
        url: /report/v3/api-docs
  api-docs:
    enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG