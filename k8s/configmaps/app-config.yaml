apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: social-platform
data:
  # URLs internes Kubernetes (via service DNS)
  config-server-url: "http://config-server:8888"
  eureka-url: "http://eureka:eureka-secret@discovery-service:8761/eureka/"
  redis-host: "redis"
  redis-port: "6379"
  rabbitmq-host: "rabbitmq"
  rabbitmq-port: "5672"
  postgres-host: "postgres"
  postgres-port: "5432"
  # Spring profiles
  spring-profiles: "prod"
  # Logging
  log-level: "INFO"
