apiVersion: apps/v1
kind: Deployment
metadata:
  name: scoring-service
  namespace: social-platform
  labels:
    app: scoring-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scoring-service
  template:
    metadata:
      labels:
        app: scoring-service
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres 5432; do echo waiting; sleep 3; done"]
      containers:
        - name: scoring-service
          image: social-platform-scoring-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8083
          env:
            - name: DATABASE_URL
              value: "postgresql://social_user:SocialTogo2024@postgres:5432/social_db"
            - name: REDIS_SERVICE_HOST
              value: "redis"
            - name: REDIS_SERVICE_PORT
              value: "6379"
            - name: RABBIT_HOST
              value: "rabbitmq"
            - name: RABBIT_PORT
              value: "5672"
            - name: RABBIT_USER
              value: "social_rabbit"
            - name: RABBIT_PASSWORD
              value: "RabbitTogo2024"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-service:8761/eureka/"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"