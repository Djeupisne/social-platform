apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: social-platform
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      initContainers:
      - name: wait-discovery
        image: busybox:1.36
        command: ['sh', '-c', 'until wget -q http://eureka:eureka-secret@discovery-service:8761/actuator/health; do echo waiting; sleep 5; done']
      containers:
      - name: api-gateway
        image: social-platform-api-gateway:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 9000
        env:
        - name: SPRING_CLOUD_CONFIG_URI
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: config-server-url
        - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: eureka-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: jwt-secret
        - name: SPRING_REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: redis-host
        - name: SPRING_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: redis-password
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 9000
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: social-platform
spec:
  selector:
    app: api-gateway
  ports:
  - port: 9000
    targetPort: 9000
  type: LoadBalancer
