server:
  port: 8081

spring:
  application:
    name: auth-service

  # Configuration de la base de données
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:social_db}
    username: ${POSTGRES_USER:social_user}
    password: ${POSTGRES_PASSWORD:social_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Configuration JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true                # Ajouté pour voir les requêtes SQL
        format_sql: true               # Ajouté pour formater les requêtes
        use_sql_comments: true         # Ajouté pour avoir des commentaires
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        org:
          hibernate:
            envers:
              audit_table_prefix: audit_
              audit_table_suffix: _history
              revision_field_name: rev
              revision_type_field_name: revtype
              store_data_at_delete: true
              default_schema: public
    open-in-view: false                # Désactivé pour les bonnes pratiques
    generate-ddl: true                 # Ajouté pour forcer la génération DDL

  # Configuration Redis
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  # Configuration Mail
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    test-connection: false

  # Configuration Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Africa/Lome
    serialization:
      write-dates-as-timestamps: false

# Configuration JWT
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_EXPIRATION:86400000}           # 24 heures en ms
  refresh-expiration: 604800000                     # 7 jours en ms
  issuer: social-platform
  audience: social-platform-users

# Configuration Eureka
eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
    instance-info-replication-interval-seconds: 10
  instance:
    hostname: ${spring.application.name}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
    status-page-url-path: /actuator/info
    health-check-url-path: /actuator/health
    metadata-map:
      start: ${random.int}
      version: 1.0.0

# Configuration Management et Monitoring
management:
  endpoints:
    web:
      exposure:
        include: "*"
      base-path: /actuator
    enabled-by-default: true
  endpoint:
    health:
      show-details: always
      show-components: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  health:
    mail:
      enabled: false
    redis:
      enabled: true
    db:
      enabled: true
    diskspace:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: production

# Configuration Logging
logging:
  level:
    com.social.auth: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.security: DEBUG
    com.netflix: WARN
    org.apache.kafka: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/auth-service.log
    max-size: 10MB
    max-history: 30

# Configuration spécifique à l'application
app:
  security:
    jwt:
      header: Authorization
      prefix: Bearer
    bcrypt:
      strength: 10
    two-factor:
      issuer: Social-Platform
      digits: 6
      period: 30
      temp-code-expiration: 300000  # 5 minutes
    login:
      max-attempts: 5
      lock-duration: 900000  # 15 minutes
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:8100
      - http://localhost
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
  redis:
    cache-ttl: 3600

# Configuration du thread pool
task:
  execution:
    pool:
      core-size: 5
      max-size: 10
      queue-capacity: 25
    thread-name-prefix: auth-task-