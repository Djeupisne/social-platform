server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/${DB_NAME:social_db}
    username: ${DB_USER:social_user}
    password: ${DB_PASSWORD:social_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    generate-ddl: true

  data:
    redis:
      host: ${REDIS_SERVICE_HOST:redis}
      port: 6379
      timeout: 2000ms

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: 587
    username: ${MAIL_USERNAME:noreply@social-togo.tg}
    password: ${MAIL_PASSWORD:password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    test-connection: false

# ─── JWT (tokens internes) ───────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: 604800000
  issuer: social-platform
  audience: social-platform-users

# ─── Keycloak ────────────────────────────────────────────────────────────────
keycloak:
  server-url: ${KEYCLOAK_URL:http://keycloak:8080}
  realm: ${KEYCLOAK_REALM:social-togo}
  client-id: ${KEYCLOAK_CLIENT_ID:social-platform}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:social-platform-secret-2024}
  admin-username: ${KEYCLOAK_ADMIN:admin}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD:Admin@Keycloak2024!}

# ─── Eureka ───────────────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: ${spring.application.name}
    prefer-ip-address: true
    health-check-url-path: /actuator/health

# ─── Management ───────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    mail:
      enabled: false

# ─── App config ───────────────────────────────────────────────────────────────
app:
  security:
    jwt:
      header: Authorization
      prefix: Bearer
    bcrypt:
      strength: 10
    two-factor:
      issuer: Social-Platform
      digits: 6
      period: 30
      temp-code-expiration: 300000
    login:
      max-attempts: 5
      lock-duration: 900000
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:8100
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
  redis:
    cache-ttl: 3600