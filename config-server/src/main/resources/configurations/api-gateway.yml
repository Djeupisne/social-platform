spring:
  data:
    redis:
      host: redis
      port: 6379
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: main-service
          uri: http://main-service:8082
          predicates:
            - Path=/api/v1/menages/**,/api/v1/residents/**
        - id: scoring-service
          uri: http://scoring-service:8083
          predicates:
            - Path=/api/v1/scoring/**
        - id: admin-service
          uri: http://admin-service:8084
          predicates:
            - Path=/api/v1/admin/**,/api/v1/programmes/**
        - id: report-service
          uri: http://report-service:8085
          predicates:
            - Path=/api/v1/reports/**

eureka:
  instance:
    hostname: api-gateway
    prefer-ip-address: true
