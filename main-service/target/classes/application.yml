server:
  port: 8082
spring:
  application:
    name: main-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/${DB_NAME:social_db}
    username: ${DB_USER:social_user}
    password: ${DB_PASSWORD:social_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    generate-ddl: true
  rabbitmq:
    host: ${RABBIT_HOST:rabbitmq}
    port: 5672
    username: ${RABBIT_USER:social_rabbit}
    password: ${RABBIT_PASSWORD:RabbitTogo2024}
eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: ${spring.application.name}
    prefer-ip-address: true
    health-check-url-path: /actuator/health
management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    mail:
      enabled: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    try-it-out-enabled: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true